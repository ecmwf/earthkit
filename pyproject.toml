[build-system]
requires = [ "setuptools>=61" ]

[project]
name = "earthkit"
description = "Toolkit for earth science workflows"
readme = "README.md"
license = { text = "Apache License Version 2.0" }
authors = [
  { name = "European Centre for Medium-Range Weather Forecasts (ECMWF)", email = "software.support@ecmwf.int" },
]
requires-python = ">=3.10"

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
  "Topic :: Scientific/Engineering",
]
dynamic = [ "version" ]
dependencies = [
  "earthkit-data[all]>=1.0.0rc0",
  "earthkit-geo[all]>=1.0.0rc0",
  "earthkit-hydro>=1.3.0",
  "earthkit-meteo>=1.0.0rc0",
  "earthkit-plots>=1.0.0rc0",
  "earthkit-transforms>=1.0.0rc0",
  "earthkit-utils>=1.0.0rc0",
]
optional-dependencies.test = [ "pytest", "pytest-forked" ]
urls.Documentation = "https://earthkit.readthedocs.io/"
urls.Homepage = "https://github.com/ecmwf/earthkit/"
urls.Issues = "https://github.com/ecmwf/earthkit.issues"
urls.Repository = "https://github.com/ecmwf/earthkit/"

[tool.setuptools]
packages = [  ]

[tool.isort]
profile = "black"

[tool.coverage.run]
branch = "true"

[tool.pydocstyle]
add_ignore = [ "D1", "D200", "D205", "D400", "D401" ]
convention = "numpy"
